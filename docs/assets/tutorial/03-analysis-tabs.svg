<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">核心分析标签页说明图</title>
  <desc id="desc">展示图表、统计、相关性、分组和时间对比等分析入口。</desc>
  <rect width="1200" height="720" fill="#f6f8fc"/>
  <text x="72" y="68" fill="#17358f" font-size="34" font-weight="800" font-family="Arial, sans-serif">核心分析入口</text>
  <text x="72" y="100" fill="#64748b" font-size="16" font-family="Arial, sans-serif">同一份数据可以从多个角度分析。先看趋势，再看结构，最后定位明细。</text>

  <g transform="translate(72 144)" font-family="Arial, sans-serif">
    <rect width="320" height="210" rx="14" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="24" y="42" fill="#0f172a" font-size="22" font-weight="800">图表</text>
    <text x="24" y="72" fill="#64748b" font-size="14">适合快速看数值走势和大小对比。</text>
    <rect x="24" y="112" width="44" height="58" rx="6" fill="#17358f"/>
    <rect x="84" y="88" width="44" height="82" rx="6" fill="#0796b3"/>
    <rect x="144" y="124" width="44" height="46" rx="6" fill="#16a34a"/>
    <polyline points="214,160 244,130 274,140 300,96" fill="none" stroke="#ef4444" stroke-width="5"/>
  </g>

  <g transform="translate(440 144)" font-family="Arial, sans-serif">
    <rect width="320" height="210" rx="14" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="24" y="42" fill="#0f172a" font-size="22" font-weight="800">统计</text>
    <text x="24" y="72" fill="#64748b" font-size="14">自动计算数字列的常用指标。</text>
    <rect x="24" y="104" width="122" height="70" rx="10" fill="#eef5ff"/>
    <text x="40" y="132" fill="#17358f" font-size="13" font-weight="700">平均值</text>
    <text x="40" y="158" fill="#0f172a" font-size="24" font-weight="800">6,214</text>
    <rect x="168" y="104" width="122" height="70" rx="10" fill="#ecfdf5"/>
    <text x="184" y="132" fill="#047857" font-size="13" font-weight="700">利润</text>
    <text x="184" y="158" fill="#0f172a" font-size="24" font-weight="800">2,480</text>
  </g>

  <g transform="translate(808 144)" font-family="Arial, sans-serif">
    <rect width="320" height="210" rx="14" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="24" y="42" fill="#0f172a" font-size="22" font-weight="800">相关性</text>
    <text x="24" y="72" fill="#64748b" font-size="14">查看数字列之间的强弱关系。</text>
    <g transform="translate(24 102)">
      <rect width="50" height="50" fill="#dbeafe"/>
      <rect x="54" width="50" height="50" fill="#93c5fd"/>
      <rect x="108" width="50" height="50" fill="#fecaca"/>
      <rect y="54" width="50" height="50" fill="#93c5fd"/>
      <rect x="54" y="54" width="50" height="50" fill="#dbeafe"/>
      <rect x="108" y="54" width="50" height="50" fill="#fca5a5"/>
      <text x="190" y="38" fill="#0f172a" font-size="18" font-weight="800">0.86</text>
      <text x="190" y="68" fill="#64748b" font-size="13">强相关</text>
    </g>
  </g>

  <g transform="translate(72 408)" font-family="Arial, sans-serif">
    <rect width="320" height="210" rx="14" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="24" y="42" fill="#0f172a" font-size="22" font-weight="800">分组</text>
    <text x="24" y="72" fill="#64748b" font-size="14">按区域、品类、销售等维度聚合。</text>
    <rect x="24" y="104" width="272" height="34" rx="8" fill="#f8fafc" stroke="#dbe3ef"/>
    <text x="40" y="126" fill="#334155" font-size="13">group by region</text>
    <rect x="24" y="150" width="272" height="34" rx="8" fill="#f8fafc" stroke="#dbe3ef"/>
    <text x="40" y="172" fill="#334155" font-size="13">sum(revenue), avg(profit)</text>
  </g>

  <g transform="translate(440 408)" font-family="Arial, sans-serif">
    <rect width="320" height="210" rx="14" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="24" y="42" fill="#0f172a" font-size="22" font-weight="800">时间对比</text>
    <text x="24" y="72" fill="#64748b" font-size="14">检查两个时间列的先后顺序。</text>
    <rect x="24" y="108" width="78" height="30" rx="15" fill="#dcfce7"/>
    <text x="42" y="128" fill="#166534" font-size="12" font-weight="700">A → B</text>
    <rect x="118" y="108" width="94" height="30" rx="15" fill="#fee2e2"/>
    <text x="137" y="128" fill="#991b1b" font-size="12" font-weight="700">顺序异常</text>
    <rect x="228" y="108" width="68" height="30" rx="15" fill="#e2e8f0"/>
    <text x="247" y="128" fill="#334155" font-size="12" font-weight="700">缺失</text>
  </g>

  <g transform="translate(808 408)" font-family="Arial, sans-serif">
    <rect width="320" height="210" rx="14" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="24" y="42" fill="#0f172a" font-size="22" font-weight="800">导出</text>
    <text x="24" y="72" fill="#64748b" font-size="14">当前数据、查询结果、时间对比结果都能导出。</text>
    <rect x="24" y="110" width="272" height="48" rx="10" fill="#17358f"/>
    <text x="108" y="141" fill="#ffffff" font-size="15" font-weight="800">导出 CSV</text>
  </g>
</svg>
