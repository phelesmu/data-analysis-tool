<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">数据分析工具主工作区说明图</title>
  <desc id="desc">展示上传数据后的主界面结构，包括数据源、筛选器、日期范围、时间分布、标签页和数据表。</desc>
  <defs>
    <linearGradient id="header" x1="0" x2="1">
      <stop offset="0" stop-color="#17358f"/>
      <stop offset="1" stop-color="#0796b3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="#f6f8fc"/>

  <g transform="translate(72 52)">
    <text x="0" y="0" fill="url(#header)" font-size="34" font-weight="800" font-family="Arial, sans-serif">数据分析工具</text>
    <text x="0" y="32" fill="#64748b" font-size="16" font-family="Arial, sans-serif">上传数据后快速查看统计、筛选和图表</text>
    <rect x="700" y="-26" width="120" height="36" rx="8" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="742" y="-3" fill="#0f172a" font-size="13" font-family="Arial, sans-serif">中文</text>
    <rect x="840" y="-26" width="112" height="36" rx="8" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="868" y="-3" fill="#0f172a" font-size="13" font-family="Arial, sans-serif">导出当前数据</text>
    <rect x="966" y="-26" width="96" height="36" rx="8" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="990" y="-3" fill="#0f172a" font-size="13" font-family="Arial, sans-serif">添加文件</text>
  </g>

  <g filter="url(#shadow)" transform="translate(72 118)">
    <rect width="1056" height="50" rx="10" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="20" y="31" fill="#334155" font-size="14" font-weight="700" font-family="Arial, sans-serif">当前文件：</text>
    <text x="96" y="31" fill="#0f172a" font-size="14" font-family="Arial, sans-serif">demo_data_analysis_tool.csv · 64 行</text>
    <rect x="710" y="12" width="220" height="26" rx="7" fill="#eef5ff" stroke="#c8d9ff"/>
    <text x="725" y="30" fill="#17358f" font-size="12" font-weight="700" font-family="Arial, sans-serif">Main: demo... 64 rows · 33 cols</text>
    <text x="950" y="31" fill="#64748b" font-size="13" font-family="Arial, sans-serif">64 行 × 33 列</text>
  </g>

  <g filter="url(#shadow)" transform="translate(72 194)">
    <rect width="505" height="154" rx="12" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="22" y="34" fill="#0f172a" font-size="17" font-weight="800" font-family="Arial, sans-serif">筛选器</text>
    <text x="22" y="64" fill="#64748b" font-size="13" font-family="Arial, sans-serif">按文本、数字、日期设置条件。</text>
    <rect x="22" y="88" width="135" height="34" rx="8" fill="#f8fafc" stroke="#dbe3ef"/>
    <text x="38" y="110" fill="#334155" font-size="13" font-family="Arial, sans-serif">region = East</text>
    <rect x="172" y="88" width="160" height="34" rx="8" fill="#f8fafc" stroke="#dbe3ef"/>
    <text x="188" y="110" fill="#334155" font-size="13" font-family="Arial, sans-serif">revenue &gt; 5000</text>
    <rect x="347" y="88" width="135" height="34" rx="8" fill="#f8fafc" stroke="#dbe3ef"/>
    <text x="363" y="110" fill="#334155" font-size="13" font-family="Arial, sans-serif">returned = No</text>
  </g>

  <g filter="url(#shadow)" transform="translate(605 194)">
    <rect width="523" height="154" rx="12" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="22" y="34" fill="#0f172a" font-size="17" font-weight="800" font-family="Arial, sans-serif">日期范围筛选</text>
    <text x="22" y="64" fill="#64748b" font-size="13" font-family="Arial, sans-serif">选择日期列，再用滑块锁定时间窗口。</text>
    <line x1="52" y1="106" x2="472" y2="106" stroke="#17358f" stroke-width="7" stroke-linecap="round"/>
    <circle cx="52" cy="106" r="11" fill="#ffffff" stroke="#17358f" stroke-width="3"/>
    <circle cx="472" cy="106" r="11" fill="#ffffff" stroke="#17358f" stroke-width="3"/>
    <text x="22" y="137" fill="#334155" font-size="13" font-family="Arial, sans-serif">2024-01-05</text>
    <text x="400" y="137" fill="#334155" font-size="13" font-family="Arial, sans-serif">2025-12-28</text>
  </g>

  <g filter="url(#shadow)" transform="translate(72 374)">
    <rect width="1056" height="180" rx="12" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="22" y="34" fill="#0f172a" font-size="17" font-weight="800" font-family="Arial, sans-serif">时间分布</text>
    <text x="114" y="34" fill="#64748b" font-size="13" font-family="Arial, sans-serif">按日 / 周 / 月自动切换粒度，查看数据密度和累计趋势。</text>
    <g transform="translate(54 68)">
      <line x1="0" y1="78" x2="930" y2="78" stroke="#dbe3ef"/>
      <line x1="0" y1="18" x2="930" y2="18" stroke="#eef2f7"/>
      <rect x="4" y="34" width="18" height="44" fill="#111827" rx="4"/>
      <rect x="48" y="28" width="18" height="50" fill="#111827" rx="4"/>
      <rect x="92" y="24" width="18" height="54" fill="#111827" rx="4"/>
      <rect x="136" y="38" width="18" height="40" fill="#111827" rx="4"/>
      <rect x="180" y="20" width="18" height="58" fill="#111827" rx="4"/>
      <rect x="224" y="42" width="18" height="36" fill="#111827" rx="4"/>
      <rect x="268" y="34" width="18" height="44" fill="#111827" rx="4"/>
      <rect x="312" y="26" width="18" height="52" fill="#111827" rx="4"/>
      <rect x="356" y="30" width="18" height="48" fill="#111827" rx="4"/>
      <rect x="400" y="18" width="18" height="60" fill="#111827" rx="4"/>
      <polyline points="13,64 57,60 101,57 145,54 189,48 233,46 277,42 321,38 365,35 409,30" fill="none" stroke="#0796b3" stroke-width="4"/>
      <circle cx="409" cy="30" r="5" fill="#0796b3"/>
    </g>
  </g>

  <g filter="url(#shadow)" transform="translate(72 582)">
    <rect width="1056" height="120" rx="12" fill="#ffffff" stroke="#dbe3ef"/>
    <g transform="translate(20 20)">
      <rect width="74" height="32" rx="8" fill="#17358f"/>
      <text x="25" y="21" fill="#ffffff" font-size="13" font-weight="700" font-family="Arial, sans-serif">表格</text>
      <rect x="84" width="74" height="32" rx="8" fill="#eef2f7"/>
      <text x="109" y="21" fill="#334155" font-size="13" font-family="Arial, sans-serif">图表</text>
      <rect x="168" width="74" height="32" rx="8" fill="#eef2f7"/>
      <text x="193" y="21" fill="#334155" font-size="13" font-family="Arial, sans-serif">统计</text>
      <rect x="252" width="88" height="32" rx="8" fill="#eef2f7"/>
      <text x="277" y="21" fill="#334155" font-size="13" font-family="Arial, sans-serif">相关性</text>
      <rect x="350" width="74" height="32" rx="8" fill="#eef2f7"/>
      <text x="375" y="21" fill="#334155" font-size="13" font-family="Arial, sans-serif">分组</text>
      <rect x="434" width="74" height="32" rx="8" fill="#eef2f7"/>
      <text x="459" y="21" fill="#334155" font-size="13" font-family="Arial, sans-serif">时间</text>
      <rect x="518" width="74" height="32" rx="8" fill="#eef2f7"/>
      <text x="545" y="21" fill="#334155" font-size="13" font-family="Arial, sans-serif">SQL</text>
    </g>
    <line x1="20" y1="70" x2="1036" y2="70" stroke="#dbe3ef"/>
    <text x="22" y="98" fill="#0f172a" font-size="14" font-weight="800" font-family="Arial, sans-serif">数据预览</text>
    <text x="106" y="98" fill="#64748b" font-size="13" font-family="Arial, sans-serif">可排序、隐藏列、加载更多行。</text>
  </g>

  <g font-family="Arial, sans-serif">
    <circle cx="54" cy="143" r="17" fill="#f59e0b"/><text x="49" y="149" fill="#fff" font-size="15" font-weight="800">1</text>
    <circle cx="54" cy="220" r="17" fill="#f59e0b"/><text x="49" y="226" fill="#fff" font-size="15" font-weight="800">2</text>
    <circle cx="588" cy="220" r="17" fill="#f59e0b"/><text x="583" y="226" fill="#fff" font-size="15" font-weight="800">3</text>
    <circle cx="54" cy="401" r="17" fill="#f59e0b"/><text x="49" y="407" fill="#fff" font-size="15" font-weight="800">4</text>
    <circle cx="54" cy="607" r="17" fill="#f59e0b"/><text x="49" y="613" fill="#fff" font-size="15" font-weight="800">5</text>
  </g>
</svg>
