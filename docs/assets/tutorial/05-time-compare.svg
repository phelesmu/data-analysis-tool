<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">时间对比示例图</title>
  <desc id="desc">展示两个时间列逐行比较后的状态统计和明细。</desc>
  <rect width="1200" height="620" fill="#f6f8fc"/>
  <text x="72" y="68" fill="#17358f" font-size="34" font-weight="800" font-family="Arial, sans-serif">时间对比</text>
  <text x="72" y="100" fill="#64748b" font-size="16" font-family="Arial, sans-serif">用它检查两个时间列的先后顺序，例如 order_date → ship_date。</text>

  <g transform="translate(72 146)" font-family="Arial, sans-serif">
    <rect width="1056" height="390" rx="16" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="28" y="44" fill="#0f172a" font-size="20" font-weight="800">列 A（预期更早）</text>
    <rect x="28" y="62" width="220" height="38" rx="8" fill="#f8fafc" stroke="#dbe3ef"/>
    <text x="48" y="87" fill="#334155" font-size="14">order_date</text>

    <text x="306" y="44" fill="#0f172a" font-size="20" font-weight="800">列 B（预期更晚）</text>
    <rect x="306" y="62" width="220" height="38" rx="8" fill="#f8fafc" stroke="#dbe3ef"/>
    <text x="326" y="87" fill="#334155" font-size="14">ship_date</text>

    <rect x="620" y="62" width="140" height="38" rx="8" fill="#ffffff" stroke="#dbe3ef"/>
    <text x="646" y="87" fill="#334155" font-size="14">导出当前筛选</text>

    <g transform="translate(28 130)">
      <rect width="224" height="80" rx="12" fill="#ecfdf5" stroke="#bbf7d0"/>
      <text x="20" y="32" fill="#166534" font-size="14" font-weight="700">A → B（正常）</text>
      <text x="20" y="62" fill="#0f172a" font-size="28" font-weight="800">62</text>
      <rect x="264" width="224" height="80" rx="12" fill="#fee2e2" stroke="#fecaca"/>
      <text x="284" y="32" fill="#991b1b" font-size="14" font-weight="700">B → A（顺序异常）</text>
      <text x="284" y="62" fill="#0f172a" font-size="28" font-weight="800">2</text>
      <rect x="528" width="224" height="80" rx="12" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="548" y="32" fill="#334155" font-size="14" font-weight="700">A = B</text>
      <text x="548" y="62" fill="#0f172a" font-size="28" font-weight="800">0</text>
      <rect x="792" width="224" height="80" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="812" y="32" fill="#64748b" font-size="14" font-weight="700">缺失</text>
      <text x="812" y="62" fill="#0f172a" font-size="28" font-weight="800">0</text>
    </g>

    <g transform="translate(28 248)">
      <rect width="1000" height="42" fill="#f8fafc" stroke="#dbe3ef"/>
      <text x="18" y="27" fill="#334155" font-size="13" font-weight="700">#</text>
      <text x="100" y="27" fill="#334155" font-size="13" font-weight="700">order_date</text>
      <text x="280" y="27" fill="#334155" font-size="13" font-weight="700">ship_date</text>
      <text x="470" y="27" fill="#334155" font-size="13" font-weight="700">B - A</text>
      <text x="650" y="27" fill="#334155" font-size="13" font-weight="700">顺序</text>

      <rect y="42" width="1000" height="42" fill="#ffffff" stroke="#dbe3ef"/>
      <text x="18" y="69" fill="#64748b" font-size="13">8</text>
      <text x="100" y="69" fill="#0f172a" font-size="13" font-family="Menlo, monospace">2024-03-21</text>
      <text x="280" y="69" fill="#0f172a" font-size="13" font-family="Menlo, monospace">2024-03-20</text>
      <text x="470" y="69" fill="#0f172a" font-size="13" font-family="Menlo, monospace">-1d 0h 0m</text>
      <rect x="650" y="51" width="118" height="24" rx="12" fill="#ef4444"/>
      <text x="676" y="68" fill="#ffffff" font-size="12" font-weight="700">顺序异常</text>

      <rect y="84" width="1000" height="42" fill="#ffffff" stroke="#dbe3ef"/>
      <text x="18" y="111" fill="#64748b" font-size="13">52</text>
      <text x="100" y="111" fill="#0f172a" font-size="13" font-family="Menlo, monospace">2025-08-13</text>
      <text x="280" y="111" fill="#0f172a" font-size="13" font-family="Menlo, monospace">2025-08-12</text>
      <text x="470" y="111" fill="#0f172a" font-size="13" font-family="Menlo, monospace">-1d 0h 0m</text>
      <rect x="650" y="93" width="118" height="24" rx="12" fill="#ef4444"/>
      <text x="676" y="110" fill="#ffffff" font-size="12" font-weight="700">顺序异常</text>
    </g>
  </g>
</svg>
